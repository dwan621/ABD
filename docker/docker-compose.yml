services:
  postgres:
    image: postgres:16.8-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-abd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-abd_platform}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-abd}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 5

  spark:
    build:
      context: .
      dockerfile: spark.Dockerfile
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_URL=spark://spark:7077
    ports:
      - "127.0.0.1:7077:7077"
      - "127.0.0.1:8080:8080"
    volumes:
      - ../spark-jobs:/opt/spark-jobs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      retries: 5
      start_period: 30s

  spark-worker:
    build:
      context: .
      dockerfile: spark.Dockerfile
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark:7077
    depends_on:
      spark:
        condition: service_healthy
    volumes:
      - ../spark-jobs:/opt/spark-jobs
    restart: on-failure

  fastapi:
    build:
      context: ../backend
      dockerfile: ../docker/fastapi.Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - ../spark-jobs:/opt/spark-jobs
    restart: on-failure
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ../backend
      dockerfile: ../docker/fastapi.Dockerfile
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      spark:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - ../spark-jobs:/opt/spark-jobs
    restart: on-failure
    command: celery -A app.services.etl_service worker --loglevel=info --concurrency=2

volumes:
  postgres_data:
  minio_data:
